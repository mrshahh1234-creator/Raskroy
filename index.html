<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Печать по листам и размерам</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .setup-box { background: #34495e; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; border: 2px dashed #7f8c8d; }
        
        .sheet-block { background: #ecf0f1; color: #2c3e50; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .sheet-header { border-bottom: 2px solid #bdc3c7; margin-bottom: 10px; padding-bottom: 5px; font-weight: bold; font-size: 20px; color: #2980b9; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .size-btn { background: #f1c40f; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; text-align: center; transition: 0.2s; }
        .size-btn:hover { background: #f39c12; transform: translateY(-2px); }
        .size-btn span { display: block; font-size: 11px; font-weight: normal; margin-top: 5px; color: #34495e; }

        .status-ok { color: #2ecc71; font-weight: bold; }
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area img { visibility: visible; position: fixed; left: 0; top: 0; width: 100%; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="setup-box">
        <h3>1. Загрузите картинки (BMP)</h3>
        <input type="file" id="bmpInput" multiple accept=".bmp">
        <div id="bmpStatus" style="margin-top:5px;"></div>
    </div>

    <div class="setup-box" id="step2" style="opacity: 0.5; pointer-events: none;">
        <h3>2. Загрузите файл проекта (.CUT)</h3>
        <input type="file" id="cutInput" accept=".cut">
    </div>

    <h2 id="projName" style="text-align:center; color: #f1c40f;"></h2>
    <div id="sheetsContainer"></div>
</div>

<div id="print-area"><img id="toPrint" src=""></div>

<script>
    let imageCache = {};
    let fullProjectData = [];

    // 1. Чтение картинок
    document.getElementById('bmpInput').addEventListener('change', function(e) {
        const files = e.target.files;
        for (let file of files) {
            const name = file.name.split('.').slice(0, -1).join('.').trim();
            imageCache[name] = URL.createObjectURL(file);
        }
        document.getElementById('bmpStatus').innerHTML = `<span class="status-ok">✅ Загружено картинок: ${Object.keys(imageCache).length}</span>`;
        document.getElementById('step2').style.opacity = "1";
        document.getElementById('step2').style.pointerEvents = "auto";
    });

    // 2. Чтение CUT и распределение по листам
    document.getElementById('cutInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(event.target.result, "text/xml");
            
            const projectTitle = xml.querySelector('Project').getAttribute('Name');
            document.getElementById('projName').innerText = "Проект: " + projectTitle;

            // Находим все листы (Layout)
            const layouts = xml.querySelectorAll('Layout');
            const sheetsContainer = document.getElementById('sheetsContainer');
            sheetsContainer.innerHTML = '';

            layouts.forEach((layout, index) => {
                const sheetID = layout.getAttribute('ID');
                const sheetName = layout.getAttribute('SheetName') || "Лист";
                const partsInSheet = layout.querySelectorAll('Part[UID]'); // Только детали с ID

                // Создаем блок листа
                const sheetBlock = document.createElement('div');
                sheetBlock.className = 'sheet-block';
                sheetBlock.innerHTML = `<div class="sheet-header">ЛИСТ №${parseInt(sheetID) + 1} (${sheetName})</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'grid';

                // Группируем детали этого листа по размерам
                let sizesInSheet = {};
                partsInSheet.forEach(p => {
                    const x = p.getAttribute('X');
                    const y = p.getAttribute('Y');
                    const uid = p.getAttribute('UID');
                    
                    // Ищем имя детали (Name) в основном списке Objective по UID или порядку
                    // В AutoCUT UID обычно соответствует порядку в Objective
                    const allShapes = xml.querySelectorAll('Objective Shape');
                    const shapeInfo = allShapes[uid]; 
                    
                    if (shapeInfo) {
                        const name = shapeInfo.getAttribute('Name');
                        const sizeKey = `${x} x ${y}`;
                        if (!sizesInSheet[sizeKey]) sizesInSheet[sizeKey] = [];
                        sizesInSheet[sizeKey].push(name);
                    }
                });

                // Создаем кнопки размеров для этого листа
                Object.keys(sizesInSheet).forEach(size => {
                    const btn = document.createElement('button');
                    btn.className = 'size-btn';
                    const names = [...new Set(sizesInSheet[size])]; // Уникальные имена
                    
                    btn.innerHTML = `${size} <span>Детали: ${names.join(', ')}</span>`;
                    
                    btn.onclick = () => {
                        if (names.length === 1) {
                            doPrint(names[0]);
                        } else {
                            const choice = prompt(`На этом листе несколько деталей этого размера:\n${names.join(', ')}\nВведите нужную:`, names[0]);
                            if (choice) doPrint(choice.trim());
                        }
                    };
                    grid.appendChild(btn);
                });

                sheetBlock.appendChild(grid);
                sheetsContainer.appendChild(sheetBlock);
            });
        };
        reader.readAsText(file);
    });

    function doPrint(name) {
        if (!imageCache[name]) {
            alert(`Файл ${name}.bmp не найден!`);
            return;
        }
        const img = document.getElementById('toPrint');
        img.src = imageCache[name];
        img.onload = () => window.print();
    }
</script>

</body>
</html>
