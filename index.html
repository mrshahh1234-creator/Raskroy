<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Стили для экрана */
        body { font-family: "Arial", sans-serif; background: #555; display: flex; justify-content: center; padding: 20px; }
        .label-preview { 
            width: 100mm; height: 72mm; background: white; padding: 5mm; 
            box-sizing: border-box; position: relative; border: 1px solid #000;
        }
        
        /* Стили элементов как на картинке */
        .header-logo { font-weight: bold; font-size: 24px; border-bottom: 2px solid black; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .info-block { font-size: 14px; line-height: 1.2; }
        .info-block b { font-size: 16px; }
        
        .main-size { font-size: 32px; font-weight: bold; text-align: center; margin: 15px 0; }
        
        .qr-container { position: absolute; right: 5mm; top: 25mm; text-align: center; }
        .qr-code { width: 80px; height: 80px; }
        .qr-text { font-size: 10px; margin-top: 2px; }

        .edge-info { border: 2px solid black; display: inline-block; padding: 2px 10px; font-weight: bold; font-size: 18px; margin-left: 40%; }
        
        .footer-date { position: absolute; bottom: 2mm; right: 2mm; font-size: 12px; }

        /* Кнопка загрузки */
        .controls { position: fixed; left: 20px; top: 20px; background: white; padding: 15px; border-radius: 8px; }
        
        @media print {
            .controls { display: none; }
            body { background: none; padding: 0; }
            .label-preview { border: none; }
        }
    </style>
</head>
<body>

<div class="controls">
    <h3>Печать этикеток</h3>
    <input type="file" id="fileInput" accept=".cut"><br><br>
    <div id="list" style="max-height: 400px; overflow-y: auto;"></div>
</div>

<div id="printArea">
    </div>

<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(event) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(event.target.result, "text/xml");
        const projectName = xml.querySelector('Project').getAttribute('Name');
        const matType = xml.querySelector('Data').getAttribute('TypeName');
        const updateDate = xml.querySelector('Project').getAttribute('Update');
        
        const shapes = xml.querySelectorAll('Objective Shape');
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '<b>Выберите деталь:</b><br>';

        shapes.forEach(s => {
            if(s.getAttribute('Count') !== "0") {
                const btn = document.createElement('button');
                btn.style.display = "block";
                btn.style.margin = "5px 0";
                btn.innerText = `${s.getAttribute('Name')} (${s.getAttribute('X')}x${s.getAttribute('Y')})`;
                btn.onclick = () => renderLabel({
                    mat: matType,
                    project: projectName,
                    model: s.getAttribute('Order'),
                    nomi: s.getAttribute('Name'),
                    soni: s.getAttribute('Count'),
                    x: s.getAttribute('X'),
                    y: s.getAttribute('Y'),
                    date: updateDate
                });
                listDiv.appendChild(btn);
            }
        });
    };
    reader.readAsText(file);
});

function renderLabel(d) {
    const area = document.getElementById('printArea');
    area.innerHTML = `
        <div class="label-preview">
            <div class="header-logo">
                <span>TABRIZ GROUP</span>
                <span style="font-size: 10px;">MUSTAFAYEV ACADEMY</span>
            </div>
            
            <div class="info-block">
                <b>Mat:</b> ${d.mat}<br>
                <b>№:</b> ${d.project}<br>
                <b>Model:</b> ${d.model} <span style="margin-left:40px;"><b>Soni:</b> ${d.soni}</span><br>
                <b>Nomi:</b> №01.02 ${d.nomi}
            </div>

            <div class="main-size">${d.x} x ${d.y}</div>

            <div class="edge-info">1X19 мм Узидан</div>

            <div class="qr-container">
                <div id="qrcode"></div>
                <div class="qr-text">2603091312033055500021</div>
            </div>

            <div style="margin-top:20px; border-top: 1px solid black; height: 40px; width: 80%; position: relative;">
                 <span style="position: absolute; right: -25px; top: 10px; transform: rotate(90deg); font-size: 12px;">${d.x}</span>
                 <span style="position: absolute; bottom: -18px; left: 45%; font-size: 12px;">(A) 1<br>${d.y}</span>
            </div>

            <div class="footer-date">${d.date}</div>
        </div>
    `;

    new QRCode(document.getElementById("qrcode"), {
        text: d.nomi,
        width: 80,
        height: 80,
        correctLevel : QRCode.CorrectLevel.H
    });

    setTimeout(() => { window.print(); }, 500);
}
</script>
</body>
</html>
