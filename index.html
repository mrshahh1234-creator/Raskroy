<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Печать этикеток AutoCUT (Исправленный)</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .setup-box { background: #34495e; padding: 20px; border-radius: 10px; margin-bottom: 20px; width: 100%; max-width: 600px; text-align: center; border: 2px dashed #7f8c8d; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; width: 100%; max-width: 1000px; }
        .part-card { background: #ecf0f1; color: #2c3e50; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; border: none; width: 100%; }
        .part-card:hover { background: #3498db; color: white; }
        .part-card.missing { opacity: 0.5; background: #95a5a6; cursor: not-allowed; }
        .status { font-size: 14px; margin-top: 10px; color: #f1c40f; font-weight: bold; }
        
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area img { visibility: visible; position: absolute; left: 0; top: 0; width: 100%; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

<div class="setup-box">
    <h3>Шаг 1: Загрузите все картинки (.bmp)</h3>
    <input type="file" id="bmpInput" multiple accept=".bmp">
    <div id="bmpStatus" class="status">Картинки не выбраны</div>
</div>

<div class="setup-box" id="step2" style="opacity: 0.5; pointer-events: none;">
    <h3>Шаг 2: Выберите файл проекта (.cut)</h3>
    <input type="file" id="cutInput" accept=".cut">
</div>

<div id="projectInfo" style="margin-bottom: 15px; font-size: 18px;"></div>
<div class="grid" id="partsGrid"></div>

<div id="print-area"><img id="toPrint" src=""></div>

<script>
    let imageCache = {};

    // 1. Обработка картинок
    document.getElementById('bmpInput').addEventListener('change', function(e) {
        const files = e.target.files;
        if (files.length === 0) return;

        imageCache = {}; // Очистка старого кэша
        for (let file of files) {
            // Очищаем имя: удаляем расширение и лишние пробелы
            const name = file.name.split('.').slice(0, -1).join('.').trim();
            imageCache[name] = URL.createObjectURL(file);
        }

        document.getElementById('bmpStatus').innerText = "✅ Загружено картинок: " + Object.keys(imageCache).length;
        
        // Активируем Шаг 2 (исправлено)
        const s2 = document.getElementById('step2');
        s2.style.opacity = "1";
        s2.style.pointerEvents = "auto";
    });

    // 2. Обработка .CUT файла
    document.getElementById('cutInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(event.target.result, "text/xml");
            
            const projectName = xml.querySelector('Project').getAttribute('Name');
            document.getElementById('projectInfo').innerText = "Проект: " + projectName;

            const shapes = xml.querySelectorAll('Objective Shape');
            const grid = document.getElementById('partsGrid');
            grid.innerHTML = '';

            shapes.forEach(shape => {
                const count = parseInt(shape.getAttribute('Count'));
                const name = shape.getAttribute('Name').trim();
                
                if (count > 0) {
                    const card = document.createElement('button');
                    const isFound = imageCache.hasOwnProperty(name);
                    
                    card.className = 'part-card' + (isFound ? '' : ' missing');
                    card.innerHTML = `<b>${name}</b><br><small>Кол-во: ${count}</small>` + 
                                     (!isFound ? '<br><i style="color:red;font-size:10px;">Нет BMP</i>' : '');
                    
                    if (isFound) {
                        card.onclick = () => {
                            const img = document.getElementById('toPrint');
                            img.src = imageCache[name];
                            img.onload = () => { window.print(); };
                        };
                    } else {
                        card.onclick = () => alert("Файл " + name + ".bmp не найден среди загруженных!");
                    }
                    grid.appendChild(card);
                }
            });
        };
        reader.readAsText(file);
    });
</script>

</body>
</html>
