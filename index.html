<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Печать 80x60</title>
    <style>
        /* Оформление интерфейса */
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .box { background: #34495e; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 2px dashed #7f8c8d; }
        .sheet-block { background: #ecf0f1; color: #333; margin: 15px auto; padding: 15px; border-radius: 8px; max-width: 900px; text-align: left; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 10px; }
        .btn { background: #f1c40f; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background: #d4ac0d; }

        /* НАСТРОЙКИ ПЕЧАТИ (80мм x 60мм) */
        #print-area { display: none; }

        @media print {
            /* Скрываем всё, кроме картинки */
            body * { display: none !important; }
            
            #print-area { 
                display: block !important; 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 80mm; 
                height: 60mm; 
                margin: 0; 
                padding: 0;
                overflow: hidden;
            }

            #print-area img { 
                width: 80mm; 
                height: 60mm; 
                display: block;
                object-fit: contain; /* Сохраняет пропорции BMP внутри 8х6 см */
            }

            @page { 
                size: 80mm 60mm; 
                margin: 0; 
            }
        }
    </style>
</head>
<body>

    <div class="box">
        <h3>1. Выберите BMP картинки</h3>
        <input type="file" id="bmpInp" multiple accept=".bmp">
    </div>

    <div class="box">
        <h3>2. Выберите .CUT файл</h3>
        <input type="file" id="cutInp">
    </div>

    <div id="content"></div>

    <div id="print-area"><img id="pic"></div>

<script>
    let images = {};

    // Загрузка картинок
    document.getElementById('bmpInp').onchange = function(e) {
        for (let f of e.target.files) {
            let n = f.name.split('.')[0].trim();
            images[n] = URL.createObjectURL(f);
        }
        alert("Загружено: " + Object.keys(images).length);
    };

    // Загрузка файла и создание кнопок по листам
    document.getElementById('cutInp').onchange = function(e) {
        let r = new FileReader();
        r.onload = function(ev) {
            let xml = new DOMParser().parseFromString(ev.target.result, "text/xml");
            let out = document.getElementById('content');
            out.innerHTML = '';

            xml.querySelectorAll('Layout').forEach((lay, i) => {
                let div = document.createElement('div');
                div.className = 'sheet-block';
                div.innerHTML = `<b>ЛИСТ №${i+1}</b>`;
                let grid = document.createElement('div');
                grid.className = 'grid';

                lay.querySelectorAll('Part[UID]').forEach(p => {
                    let uid = p.getAttribute('UID');
                    let shape = xml.querySelectorAll('Objective Shape')[uid];
                    if (shape) {
                        let name = shape.getAttribute('Name');
                        let b = document.createElement('button');
                        b.className = 'btn';
                        b.innerHTML = `${p.getAttribute('X')}x${p.getAttribute('Y')}<br>${name}`;
                        b.onclick = () => {
                            if (!images[name]) return alert("Нет BMP для " + name);
                            let img = document.getElementById('pic');
                            img.src = images[name];
                            img.onload = () => { setTimeout(() => window.print(), 100); };
                        };
                        grid.appendChild(b);
                    }
                });
                div.appendChild(grid);
                out.appendChild(div);
            });
        };
        r.readAsText(e.target.files[0]);
    };
</script>
</body>
</html>
