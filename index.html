<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Печать готовых BMP этикеток</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { background: #34495e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 100%; max-width: 600px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; width: 100%; max-width: 1000px; margin-top: 20px; }
        .part-card { background: #ecf0f1; color: #2c3e50; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; transition: 0.2s; }
        .part-card:hover { background: #3498db; color: white; transform: scale(1.05); }
        .part-card b { font-size: 18px; display: block; }
        
        #print-preview { display: none; }

        @media print {
            body * { visibility: hidden; }
            #print-preview, #print-preview img { visibility: visible; position: absolute; left: 0; top: 0; width: 100%; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

<div class="controls">
    <h2>Печать этикеток (BMP)</h2>
    <p>1. Выберите файл .CUT из GitLab/папки</p>
    <input type="file" id="fileInput" accept=".cut">
    <div id="projectTitle" style="margin-top:15px; font-weight:bold; color:#f1c40f;"></div>
</div>

<div class="grid" id="partsGrid"></div>

<div id="print-preview">
    <img id="labelImage" src="" alt="label">
</div>

<script>
    // Если картинки лежат в другой папке, укажите путь здесь, например: "labels/"
    const imagePath = ""; 

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        
        reader.onload = function(event) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(event.target.result, "text/xml");
            
            const projectName = xml.querySelector('Project').getAttribute('Name'); // "Камол ака 2" [cite: 1]
            document.getElementById('projectTitle').innerText = "Проект: " + projectName;

            const shapes = xml.querySelectorAll('Objective Shape');
            const grid = document.getElementById('partsGrid');
            grid.innerHTML = '';

            shapes.forEach(shape => {
                const count = shape.getAttribute('Count');
                const name = shape.getAttribute('Name'); // Например, "P2" [cite: 5]
                const order = shape.getAttribute('Order'); // "Кровать купе" [cite: 5]

                if (count !== "0") {
                    const card = document.createElement('div');
                    card.className = 'part-card';
                    card.innerHTML = `
                        <b>${name}</b>
                        <small>${order}</small>
                        <div style="font-size:10px; margin-top:5px;">Кол-во: ${count}</div>
                    `;
                    
                    card.onclick = () => printBmp(name);
                    grid.appendChild(card);
                }
            });
        };
        reader.readAsText(file);
    });

    function printBmp(positionName) {
        const imgElement = document.getElementById('labelImage');
        // Формируем путь к картинке: P2.bmp
        imgElement.src = imagePath + positionName + ".bmp";

        imgElement.onload = function() {
            window.print();
        };

        imgElement.onerror = function() {
            alert("Файл " + positionName + ".bmp не найден в папке!");
        };
    }
</script>

</body>
</html>
